# Link checking: on PR for changed content, weekly cron for external link rot
# (PR-only checks never catch links that die after merge).
#
# Injection-safety note: no untrusted event input is interpolated into run: commands.
name: links

on:
  pull_request:
    paths: ['**/*.md']
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,206,429
            --exclude '^https://github\.com/alikwan/claude-code-agent-team/(discussions|security|issues/new)'
            './**/*.md'
          fail: true
      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link checker: broken links found'
          content-filepath: ./lychee/out.md
          labels: docs-bug
