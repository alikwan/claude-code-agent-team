<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="470" viewBox="0 0 1280 470" role="img" aria-label="The six-stage pipeline: Plan, Build, Review, Integrate, Version and Document, Release — with two human approval gates and four commit checkpoints">
  
  <rect width="1280" height="470" fill="#FFFFFF"></rect>

  
  <rect x="45" y="30" width="1190" height="52" rx="12" fill="#EFF6FF" stroke="#BFDBFE"></rect>
  <text x="640" y="55" font-size="16" font-weight="700" fill="#1D4ED8" text-anchor="middle">team-lead — the orchestrator</text>
  <text x="640" y="73" font-size="12.5" fill="#3B82F6" text-anchor="middle">drives every stage · owns all git operations · cannot write files — must delegate · لا يلمس git أحدٌ سوى المنسٳق</text>

  
  <g stroke="#DBEAFE" stroke-width="2" stroke-dasharray="3 4">
    <path d="M130 82 V150"></path><path d="M334 82 V150"></path><path d="M538 82 V150"></path><path d="M742 82 V150"></path><path d="M946 82 V150"></path><path d="M1150 82 V150"></path>
  </g>

  
  <g>
    <rect x="45" y="150" width="170" height="130" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"></rect>
    <rect x="249" y="150" width="170" height="130" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"></rect>
    <rect x="453" y="150" width="170" height="130" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"></rect>
    <rect x="657" y="150" width="170" height="130" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"></rect>
    <rect x="861" y="150" width="170" height="130" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"></rect>
    <rect x="1065" y="150" width="170" height="130" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"></rect>
  </g>

  
  <g font-size="13" font-weight="700" text-anchor="middle">
    <circle cx="130" cy="176" r="13" fill="#2563EB"></circle><text x="130" y="180.5" fill="#FFFFFF">1</text>
    <circle cx="334" cy="176" r="13" fill="#2563EB"></circle><text x="334" y="180.5" fill="#FFFFFF">2</text>
    <circle cx="538" cy="176" r="13" fill="#2563EB"></circle><text x="538" y="180.5" fill="#FFFFFF">3</text>
    <circle cx="742" cy="176" r="13" fill="#2563EB"></circle><text x="742" y="180.5" fill="#FFFFFF">4</text>
    <circle cx="946" cy="176" r="13" fill="#2563EB"></circle><text x="946" y="180.5" fill="#FFFFFF">5</text>
    <circle cx="1150" cy="176" r="13" fill="#2563EB"></circle><text x="1150" y="180.5" fill="#FFFFFF">6</text>
  </g>

  
  <g text-anchor="middle">
    <text x="130" y="218" font-size="19" font-weight="700" fill="#0F172A">Plan</text>
    <text x="334" y="218" font-size="19" font-weight="700" fill="#0F172A">Build</text>
    <text x="538" y="218" font-size="19" font-weight="700" fill="#0F172A">Review</text>
    <text x="742" y="218" font-size="19" font-weight="700" fill="#0F172A">Integrate</text>
    <text x="946" y="218" font-size="19" font-weight="700" fill="#0F172A">Version &amp; Docs</text>
    <text x="1150" y="218" font-size="19" font-weight="700" fill="#0F172A">Release</text>
    <text x="130" y="238" font-size="13" fill="#64748B">التخطيط</text>
    <text x="334" y="238" font-size="13" fill="#64748B">البناء</text>
    <text x="538" y="238" font-size="13" fill="#64748B">المراجعة</text>
    <text x="742" y="238" font-size="13" fill="#64748B">التكامل</text>
    <text x="946" y="238" font-size="13" fill="#64748B">الإصدار والتوثيق</text>
    <text x="1150" y="238" font-size="13" fill="#64748B">التسليم</text>
    <text x="130" y="262" font-size="11.5" fill="#94A3B8">team-lead</text>
    <text x="334" y="262" font-size="11.5" fill="#94A3B8">backend ∥ frontend</text>
    <text x="538" y="262" font-size="11.5" fill="#94A3B8">qa + conditional reviews</text>
    <text x="742" y="262" font-size="11.5" fill="#94A3B8">integration-agent</text>
    <text x="946" y="262" font-size="11.5" fill="#94A3B8">documentation-agent</text>
    <text x="1150" y="262" font-size="11.5" fill="#94A3B8">team-lead → PR</text>
  </g>

  
  <g stroke="#94A3B8" stroke-width="2" fill="none">
    <path d="M215 215 H243"></path><path d="M419 215 H447"></path><path d="M623 215 H651"></path><path d="M827 215 H855"></path><path d="M1031 215 H1059"></path>
  </g>
  <g fill="#94A3B8">
    <path d="M241 209 L251 215 L241 221 Z"></path><path d="M445 209 L455 215 L445 221 Z"></path><path d="M649 209 L659 215 L649 221 Z"></path><path d="M853 209 L863 215 L853 221 Z"></path><path d="M1057 209 L1067 215 L1057 221 Z"></path>
  </g>

  
  <g>
    <rect x="221" y="204" width="22" height="22" rx="3" transform="rotate(45 232 215)" fill="#F97316"></rect>
    <text x="232" y="220" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">G1</text>
    <rect x="1033" y="204" width="22" height="22" rx="3" transform="rotate(45 1044 215)" fill="#F97316"></rect>
    <text x="1044" y="220" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">G2</text>
  </g>

  
  <path d="M130 330 H1150" stroke="#CBD5E1" stroke-width="2"></path>
  <g stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="3 4">
    <path d="M334 280 V318"></path><path d="M538 280 V318"></path><path d="M742 280 V318"></path><path d="M946 280 V318"></path>
  </g>
  <g text-anchor="middle" font-weight="700" font-size="12">
    <circle cx="334" cy="330" r="12" fill="#2563EB"></circle><text x="334" y="334.5" fill="#FFFFFF">A</text>
    <circle cx="538" cy="330" r="12" fill="#2563EB"></circle><text x="538" y="334.5" fill="#FFFFFF">B</text>
    <circle cx="742" cy="330" r="12" fill="#2563EB"></circle><text x="742" y="334.5" fill="#FFFFFF">C</text>
    <circle cx="946" cy="330" r="12" fill="#2563EB"></circle><text x="946" y="334.5" fill="#FFFFFF">D</text>
  </g>
  <text x="130" y="365" font-size="12.5" fill="#64748B">git history — four commit checkpoints: every stage leaves inspectable history</text>

  
  <g font-size="13" fill="#475569">
    <rect x="49" y="410" width="15" height="15" rx="2" transform="rotate(45 56.5 417.5)" fill="#F97316"></rect>
    <text x="78" y="422">human approval gate — G1: you approve the plan · G2: you approve the version</text>
    <circle cx="656" cy="417" r="8" fill="#2563EB"></circle>
    <text x="676" y="422">commit checkpoint (A–D)</text>
    <text x="900" y="422" fill="#94A3B8">hotfix lane: stages 1 → 2 → 3 only, one builder</text>
  </g>
</svg>