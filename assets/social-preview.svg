<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Claude Code Agent Team — 9 AI sub-agents, 6-stage pipeline, 200+ production releases, English and Arabic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- mini pipeline motif -->
  <g opacity="0.9">
    <circle cx="200" cy="470" r="26" fill="#d97757"/>
    <text x="200" y="476" text-anchor="middle" fill="#0f172a" font-family="-apple-system,'Segoe UI',sans-serif" font-weight="700" font-size="15">TL</text>
    <g stroke="#475569" stroke-width="2.5">
      <line x1="226" y1="470" x2="300" y2="470"/>
      <line x1="356" y1="470" x2="430" y2="470"/>
      <line x1="486" y1="470" x2="560" y2="470"/>
      <line x1="616" y1="470" x2="690" y2="470"/>
      <line x1="746" y1="470" x2="820" y2="470"/>
      <line x1="876" y1="470" x2="950" y2="470"/>
    </g>
    <g font-family="-apple-system,'Segoe UI',sans-serif" font-weight="600" font-size="14" fill="#e2e8f0">
      <rect x="300" y="448" width="56" height="44" rx="10" fill="#2563eb"/><text x="328" y="475" text-anchor="middle">Plan</text>
      <rect x="430" y="448" width="56" height="44" rx="10" fill="#2563eb"/><text x="458" y="475" text-anchor="middle">Build</text>
      <rect x="560" y="448" width="56" height="44" rx="10" fill="#0f766e"/><text x="588" y="475" text-anchor="middle">QA</text>
      <rect x="690" y="448" width="56" height="44" rx="10" fill="#7c3aed"/><text x="718" y="475" text-anchor="middle">Wire</text>
      <rect x="820" y="448" width="56" height="44" rx="10" fill="#2563eb"/><text x="848" y="475" text-anchor="middle">Docs</text>
      <rect x="950" y="448" width="70" height="44" rx="10" fill="#d97757"/><text x="985" y="475" text-anchor="middle" fill="#0f172a">PR ✓</text>
    </g>
  </g>

  <text x="640" y="215" text-anchor="middle" font-family="-apple-system,'Segoe UI',Roboto,sans-serif" font-weight="800" font-size="76" fill="#f8fafc">Claude Code Agent Team</text>
  <text x="640" y="290" text-anchor="middle" font-family="-apple-system,'Segoe UI',Roboto,sans-serif" font-weight="500" font-size="34" fill="#94a3b8">9 AI sub-agents · 6-stage pipeline · 200+ production releases</text>
  <text x="640" y="360" text-anchor="middle" font-family="-apple-system,'Segoe UI',Roboto,sans-serif" font-weight="600" font-size="30" fill="#d97757">English + العربية</text>

  <text x="640" y="580" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="22" fill="#64748b">github.com/alikwan/claude-code-agent-team</text>
